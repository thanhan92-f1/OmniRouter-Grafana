global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    project: omnirouter
    env: production

rule_files:
  - /etc/prometheus/alerts/*.yml

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: omnirouter-exporter
    metrics_path: /metrics
    static_configs:
      - targets:
          - omnirouter-exporter:9208
        labels:
          service: omnirouter
          instance: HiTechAI

  - job_name: node-exporter
    static_configs:
      - targets:
          - node-exporter:9100
        labels:
          service: vps
          instance: HiTechAI

  - job_name: blackbox-omnirouter
    metrics_path: /probe
    params:
      module:
        - http_2xx
    static_configs:
      - targets:
          - https://platform.hitechcloud.one/api/monitoring/health
          - https://platform.hitechcloud.one/api/storage/health
          - https://platform.hitechcloud.one/api/v1
        labels:
          service: omnirouter
          instance: HiTechAI
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: target
      - target_label: __address__
        replacement: blackbox-exporter:9115
